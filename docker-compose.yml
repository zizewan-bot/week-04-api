services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: book_tracker
      POSTGRES_USER: book_user
      POSTGRES_PASSWORD: book_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U book_user -d book_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://book_user:book_password@db:5432/book_tracker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
